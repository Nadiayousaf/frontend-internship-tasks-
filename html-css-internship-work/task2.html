
<html>
    <head>
        <title>Create Container and arrange items in center.</title>
        
    </head>
    <style>
        .parent{
            background-color:yellow;
            width:500px;
            height:300px;

            display:flex;
            justify-content:center;
            align-items:center;

            gap:20px;
        }
        .child{
            background-color:orange;
            width:80px;
            height:80px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:14px;
            font-weight:bold;
        }
        
    </style>
    <body>
        <div class="parent">
            <div class="child"> 1 </div>
            <div class="child"> 2 </div>
            <div class="child"> 3 </div>
        </div>
    </body>
</html>
