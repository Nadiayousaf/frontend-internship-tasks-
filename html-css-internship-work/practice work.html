
<html>
    <head>
        <title>Create Container and arrange items in center.</title>
        
    </head>
    <style>
        .parent{
            background-color:blueviolet;
            width:300px;
            height:200px;

            display:flex;
            /*justify-content:flex-end;
            align-items:center;*/
            flex-direction:column;

            
            gap:20px;
        }
        .child{
            background-color:palevioletred;
            width:80px;
            height:80px;
            display:flex;

            justify-content:center;
            align-items:center;

            font-size:14px;
            font-weight:bold;
        
        }
        
    </style>
    <body>
        <div class="parent">
            <div class="child"> 1 </div>
            <div class="child"> 2 </div>
            <div class="child"> 3 </div>
        </div>
    </body>
</html>
