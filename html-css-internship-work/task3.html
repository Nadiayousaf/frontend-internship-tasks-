<html>
    <style>
     .parent{
        background-color:Yellow;
        width:100vw;
        Height:100vh;
        
        display:flex;
        justify-content:center;
        align-items:center;
        gap:20px;
        }
        .child{
            background-color:aliceblue;
            width:300px;
            height:150px;
            display:flex;
            justify-content:center;
            align-items:center;
            
            gap:20px;
        }
        .inner-child{
            background-color:Green;
            width:150px;
            height:80px;
            display:flex;
            justify-content:center;
            align-items:center;
            
            gap:20px;
        }
     
    </style>
    <body>
        <div class="parent">
            <div class="child" > 
                <div class="inner-child">
                    box
                </div>
            </div>

        </div>
    </body>
</html>
